name: Deploy docs to nah.build

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-docs.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: python -m pip install ".[docs]"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: python -m mkdocs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build

      - name: Push docs to schipper.ai legacy host
        env:
          SCHIPPER_AI_DEPLOY: ${{ secrets.SCHIPPER_AI_DEPLOY }}
        run: |
          if [ -z "${SCHIPPER_AI_DEPLOY:-}" ]; then
            echo "SCHIPPER_AI_DEPLOY is not configured" >&2
            exit 1
          fi

          git clone --depth 1 https://x-access-token:${SCHIPPER_AI_DEPLOY}@github.com/manuelschipper/schipper.ai.git /tmp/schipper.ai
          rm -rf /tmp/schipper.ai/static/nah
          mkdir -p /tmp/schipper.ai/static
          cp -r _build /tmp/schipper.ai/static/nah

          cd /tmp/schipper.ai
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/nah
          git diff --cached --quiet && echo "No schipper.ai docs changes" && exit 0
          git commit -m "Update nah docs from nah@${GITHUB_SHA::7}"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
