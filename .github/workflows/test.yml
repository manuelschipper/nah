name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e .[dev,config]

      - name: Run test suite
        run: pytest tests/ --ignore=tests/test_llm_live.py -q

      - name: Threat model coverage report
        if: always()
        continue-on-error: true
        run: |
          nah audit-threat-model --format markdown \
            >> "$GITHUB_STEP_SUMMARY"
