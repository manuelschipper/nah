site_name: nah
site_description: Context aware safety guard for coding agents. Because allow and deny isn't enough.
site_url: https://nah.build/
repo_url: https://github.com/manuelschipper/nah
repo_name: manuelschipper/nah
docs_dir: site
site_dir: _build

theme:
  name: material
  font: false
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  custom_dir: site/overrides

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Runtimes:
    - Claude Code: runtimes/claude-code.md
    - Codex: runtimes/codex.md
    - Terminal Guard: runtimes/terminal-guard.md
  - How it works: how-it-works.md
  - Threat model: threat-model.md
  - Configuration:
    - Overview: configuration/index.md
    - Action types: configuration/actions.md
    - Classification rules: configuration/classification-rules.md
    - Safety lists: configuration/safety-lists.md
    - Sensitive paths: configuration/sensitive-paths.md
    - Content inspection (Claude Code): configuration/content.md
    - LLM layer: configuration/llm.md
    - Database targets: configuration/database.md
    - Profiles: configuration/profiles.md
    - Airgapped environments: configuration/airgapped.md
  - CLI reference: cli.md
  - Privacy: privacy.md
