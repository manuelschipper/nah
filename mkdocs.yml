site_name: nah
site_description: Action-aware permissions for coding agents. A deterministic safety guard that keeps you in the flow.
site_url: https://nah.build/
repo_url: https://github.com/manuelschipper/nah
repo_name: manuelschipper/nah
docs_dir: site
site_dir: _build
not_in_nav: |
  configuration/claude-code.md

theme:
  name: material
  font: false
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  custom_dir: site/overrides

extra_css:
  - stylesheets/custom.css?v=11
  - stylesheets/benchmark-proof.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Runtimes:
    - Claude Code: runtimes/claude-code.md
    - Codex: runtimes/codex.md
    - Terminal Guard: runtimes/terminal-guard.md
  - Guides:
    - How it works: how-it-works.md
    - Using nah as a team: guides/team-configuration.md
    - Running unsupervised agents: guides/unsupervised-agents.md
    - Threat model: threat-model.md
  - Configuration:
    - Overview: configuration/index.md
    - Action types: configuration/actions.md
    - Classification rules: configuration/classification-rules.md
    - Safety lists: configuration/safety-lists.md
    - Sensitive paths: configuration/sensitive-paths.md
    - Presets: configuration/profiles.md
    - Content inspection (Claude Code): configuration/content.md
    - LLM layer: configuration/llm.md
    - Database targets: configuration/database.md
  - CLI reference: cli.md
  - Privacy: privacy.md
  - License: license.md
